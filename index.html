  <style>
    .loader {
      padding: 10px;
      text-align: center;
      font-style: italic;
      color: #888;
    }

    .deck-container {
      padding: 10px 24px;
      max-width: 960px;
      margin: 0 auto;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    .deck-header {
      margin-bottom: 10px;
      flex-shrink: 0;
      text-align: center;
    }

    .deck-header .player-name {
      margin: 0;
      font-size: 1.15em;
      font-weight: 700;
      color: #1a1a1a;
      letter-spacing: 0.3px;
    }

    .deck-header .deck-meta {
      margin: 2px 0 0 0;
      color: #888;
      font-size: 0.78em;
    }

    .decklist-columns {
      flex: 1;
      display: flex;
      gap: 32px;
      min-height: 0;
    }

    .deck-col {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .deck-col.sideboard-col {
      flex: 0 0 28%;
    }

    .card-category {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .category-label {
      font-size: 0.7em;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #aaa;
      padding-bottom: 3px;
      margin-bottom: 2px;
      border-bottom: 1px solid #e8e8e8;
    }

    .card-row {
      display: flex;
      align-items: baseline;
      padding: 1px 0;
      font-size: 0.82em;
      line-height: 1.45;
    }

    .card-row:hover {
      background: #f5f5f5;
      border-radius: 3px;
    }

    .card-qty {
      width: 22px;
      text-align: right;
      margin-right: 6px;
      color: #999;
      font-size: 0.9em;
      flex-shrink: 0;
    }

    .card-name {
      color: #333;
      cursor: pointer;
    }

    .card-name:hover {
      color: #1a6dd4;
    }

    .col-title {
      font-size: 0.75em;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #666;
      padding-bottom: 4px;
      margin: 0;
      border-bottom: 2px solid #ddd;
    }

    .col-title.sideboard-title {
      border-bottom-color: #666;
      color: #666;
    }
  </style>
</head>

<body>
  <div class="header-container">
    <h1>Merchant Scroll</h1>
    <strong>Scroll infinite Magic: The Gathering decks</strong>
    <div class="format-selector">
      <label for="format-select"><strong>Format:</strong></label>
      <select id="format-select" name="format">
        <option value="pauper" selected>Pauper</option>
      </select>
    </div>
    <div class="info" id="info">Last update: </div>
    <div class="info" id="available-decks">Available decks: </div>
  </div>

  <div id="content" class="image-container">
    <div class="loader" id="loader">Loading...</div>
  </div>

  <div id="card-preview"><img id="card-preview-img" alt=""></div>

  <footer>
    <span>Powered by</span>
    <img src="https://raw.githubusercontent.com/chumpblocckami/merchantscroll/main/assets/logo.png"
      alt="Wizards Cottage" class="footer-logo">
  </footer>

  <script>
    const content = document.getElementById("content");
    const loader = document.getElementById("loader");
    const cardPreview = document.getElementById("card-preview");
    const cardPreviewImg = document.getElementById("card-preview-img");
    const isTouchDevice = "ontouchstart" in window || navigator.maxTouchPoints > 0;

    function scryfallImageUrl(cardName) {
      return `https://api.scryfall.com/cards/named?exact=${encodeURIComponent(cardName)}&format=image&version=normal`;
    }

    function showPreview(cardName, x, y) {
      cardPreviewImg.src = scryfallImageUrl(cardName);
      cardPreview.style.display = "block";
      positionPreview(x, y);
    }

    function positionPreview(x, y) {
      const pw = 260;
      const ph = 370;
      let left = x + 16;
      let top = y + 16;
      if (left + pw > window.innerWidth) left = x - pw - 8;
      if (top + ph > window.innerHeight) top = window.innerHeight - ph - 8;
      if (top < 0) top = 8;
      cardPreview.style.left = left + "px";
      cardPreview.style.top = top + "px";
    }

    function hidePreview() {
      cardPreview.style.display = "none";
      cardPreviewImg.src = "";
    }

    document.addEventListener("click", (e) => {
      if (isTouchDevice && !e.target.closest(".card-name")) {
        hidePreview();
      }
    });

    const fileBase = "https://raw.githubusercontent.com/chumpblocckami/merchantscroll/";
    const formats = {
      pauper: "main/assets/pauper/tournaments.txt",
    };

    let tournamentUrls = [];
    let nextTournamentIdx = 0;
    let allDecks = [];
    let deckIndex = 0;
    let loadingTournament = false;

    function clearView() {
      content.innerHTML = "";
      content.appendChild(loader);
      loader.style.display = "block";
      loader.textContent = "Loading...";
    }

    function categorizeCards(cards) {
      const cats = {
        creatures: { label: "Creatures", entries: {}, total: 0 },
        spells: { label: "Spells", entries: {}, total: 0 },
        lands: { label: "Lands", entries: {}, total: 0 },
      };
      cards.forEach(card => {
        const name = card.card_attributes.card_name;
        const type = (card.card_attributes.card_type || "").trim();
        const qty = parseInt(card.qty) || 1;
        let cat;
        if (type === "ISCREA") cat = "creatures";
        else if (type === "LAND") cat = "lands";
        else cat = "spells";
        if (cats[cat].entries[name]) cats[cat].entries[name] += qty;
        else cats[cat].entries[name] = qty;
        cats[cat].total += qty;
      });
      return cats;
    }

    function flatGroupCards(cards) {
      const grouped = {};
      cards.forEach(card => {
        const name = card.card_attributes.card_name;
        const qty = parseInt(card.qty) || 1;
        grouped[name] = (grouped[name] || 0) + qty;
      });
      return Object.entries(grouped).sort((a, b) =>
        b[1] !== a[1] ? b[1] - a[1] : a[0].localeCompare(b[0])
      );
    }

    function attachCardPreview(nameSpan, cardName) {
      if (isTouchDevice) {
        nameSpan.addEventListener("click", (e) => {
          e.stopPropagation();
          const rect = nameSpan.getBoundingClientRect();
          showPreview(cardName, rect.left, rect.bottom);
        });
      } else {
        nameSpan.addEventListener("mouseenter", (e) => showPreview(cardName, e.clientX, e.clientY));
        nameSpan.addEventListener("mousemove", (e) => positionPreview(e.clientX, e.clientY));
        nameSpan.addEventListener("mouseleave", hidePreview);
      }
    }

    function buildCardRow(cardName, qty) {
      const row = document.createElement("div");
      row.className = "card-row";
      const qtySpan = document.createElement("span");
      qtySpan.className = "card-qty";
      qtySpan.textContent = qty;
      const nameSpan = document.createElement("span");
      nameSpan.className = "card-name";
      nameSpan.textContent = cardName;
      attachCardPreview(nameSpan, cardName);
      row.appendChild(qtySpan);
      row.appendChild(nameSpan);
      return row;
    }

    function renderCategorized(cards) {
      const cats = categorizeCards(cards);
      const frag = document.createDocumentFragment();
      for (const key of ["creatures", "spells", "lands"]) {
        const cat = cats[key];
        if (cat.total === 0) continue;
        const section = document.createElement("div");
        section.className = "card-category";
        const label = document.createElement("div");
        label.className = "category-label";
        label.textContent = `${cat.label} (${cat.total})`;
        section.appendChild(label);
        const sorted = Object.entries(cat.entries).sort((a, b) =>
          b[1] !== a[1] ? b[1] - a[1] : a[0].localeCompare(b[0])
        );
        sorted.forEach(([name, qty]) => section.appendChild(buildCardRow(name, qty)));
        frag.appendChild(section);
      }
      return frag;
    }

    function renderFlatList(cards) {
      const frag = document.createDocumentFragment();
      flatGroupCards(cards).forEach(([name, qty]) =>
        frag.appendChild(buildCardRow(name, qty))
      );
      return frag;
    }

    function renderSingleDeck(entry) {
      const container = document.createElement("div");
      container.className = "deck-container";

      const header = document.createElement("div");
      header.className = "deck-header";

      const playerName = document.createElement("div");
      playerName.className = "player-name";
      playerName.textContent = entry.player || "Unknown Player";
      header.appendChild(playerName);

      const meta = document.createElement("div");
      meta.className = "deck-meta";
      meta.textContent = `${entry.tournamentName}  ·  ${entry.tournamentDate}  ·  Deck ${deckIndex + 1} of ${allDecks.length}${nextTournamentIdx < tournamentUrls.length ? "+" : ""}`;
      header.appendChild(meta);

      container.appendChild(header);

      const columns = document.createElement("div");
      columns.className = "decklist-columns";

      if (entry.decklist.main_deck && entry.decklist.main_deck.length > 0) {
        const mainCol = document.createElement("div");
        mainCol.className = "deck-col";
        const mainTitle = document.createElement("h4");
        mainTitle.className = "col-title";
        mainTitle.textContent = "Main Deck";
        mainCol.appendChild(mainTitle);
        mainCol.appendChild(renderCategorized(entry.decklist.main_deck));
        columns.appendChild(mainCol);
      }

      if (entry.decklist.sideboard_deck && entry.decklist.sideboard_deck.length > 0) {
        const sideCol = document.createElement("div");
        sideCol.className = "deck-col sideboard-col";
        const sideTitle = document.createElement("h4");
        sideTitle.className = "col-title sideboard-title";
        sideTitle.textContent = "Sideboard";
        sideCol.appendChild(sideTitle);
        sideCol.appendChild(renderFlatList(entry.decklist.sideboard_deck));
        columns.appendChild(sideCol);
      }

      container.appendChild(columns);
      return container;
    }

    function buildUrl(path) {
      if (path.startsWith("http")) return path;
      if (path.startsWith("refs/heads/")) return fileBase + path;
      if (path.startsWith("/")) return fileBase + path.slice(1);
      return fileBase + "refs/heads/main/" + path;
    }

    function loadNextTournament() {
      if (loadingTournament || nextTournamentIdx >= tournamentUrls.length) return Promise.resolve();
      loadingTournament = true;

      const url = buildUrl(tournamentUrls[nextTournamentIdx]);
      nextTournamentIdx++;

      return fetch(url, { cache: "no-store" })
        .then(res => {
          if (!res.ok) throw new Error("Fetch failed: " + url);
          return res.json();
        })
        .then(jsonData => {
          const tournamentName = jsonData.description || jsonData.name || "";
          const tournamentDate = jsonData.starttime || jsonData.publish_date || "";
          const decklists = jsonData.decklists || [];
          decklists.forEach(decklist => {
            allDecks.push({ tournamentName, tournamentDate, player: decklist.player, decklist });
          });
          loadingTournament = false;
        })
        .catch(err => {
          console.warn("Skipping tournament:", err);
          loadingTournament = false;
          return loadNextTournament();
        });
    }

    function showDeck() {
      if (deckIndex < 0) deckIndex = 0;
      if (deckIndex >= allDecks.length) {
        loader.textContent = "No more decks.";
        loader.style.display = "block";
        return;
      }
      content.innerHTML = "";
      const rendered = renderSingleDeck(allDecks[deckIndex]);
      content.appendChild(rendered);
    }

    async function advanceDeck() {
      deckIndex++;
      while (deckIndex >= allDecks.length && nextTournamentIdx < tournamentUrls.length) {
        loader.textContent = "Loading more decks...";
        loader.style.display = "block";
        content.innerHTML = "";
        content.appendChild(loader);
        await loadNextTournament();
      }
      showDeck();
    }

    function fetchDecklist(format) {
      const fileUrl = `${fileBase}${formats[format]}`;
      clearView();
      tournamentUrls = [];
      allDecks = [];
      deckIndex = 0;
      nextTournamentIdx = 0;

      const currentYear = new Date().getFullYear().toString();

      fetch(fileUrl)
        .then(res => {
          if (!res.ok) throw new Error("Error fetching tournament list.");
          return res.text();
        })
        .then(async text => {
          tournamentUrls = text
            .split(/\s+/)
            .map(u => u.trim())
            .filter(u => u.length > 0 && u.includes(currentYear))
            .map(u => {
              const slug = u.split("/").pop();
              return `refs/heads/main/assets/${format}/raw/${slug}.json`;
            });

          document.getElementById("available-decks").textContent =
            "Available " + format + " tournaments: " + tournamentUrls.length;

          if (tournamentUrls.length > 0) {
            await loadNextTournament();
            showDeck();
          } else {
            loader.textContent = "No tournaments found for " + currentYear;
          }
        })
        .catch((err) => {
          console.log(err);
          loader.textContent = "Error loading list.";
        });
    }

    // Handle format change
    document.querySelector('select[name="format"]').addEventListener("change", (e) => {
      fetchDecklist(e.target.value);
    });

    let throttle = false;
    function handleScroll(direction) {
      if (throttle) return;
      throttle = true;
      setTimeout(() => throttle = false, 500);

      if (direction === "next") {
        advanceDeck();
      } else if (direction === "prev" && deckIndex > 0) {
        deckIndex--;
        showDeck();
      }
    }

    // Desktop scroll
    content.addEventListener("wheel", (event) => {
      event.preventDefault();
      if (event.deltaY > 0) handleScroll("next");
      else handleScroll("prev");
    }, { passive: false });

    // Mobile swipe
    let touchStartY = 0;
    let touchEndY = 0;
    content.addEventListener("touchstart", (e) => {
      touchStartY = e.changedTouches[0].screenY;
    });
    content.addEventListener("touchend", (e) => {
      touchEndY = e.changedTouches[0].screenY;
      const deltaY = touchStartY - touchEndY;
      if (Math.abs(deltaY) > 50) {
        if (deltaY > 0) handleScroll("next");
        else handleScroll("prev");
      }
    });

    // Initial load
    fetchDecklist("pauper");

    // Last update info
    const updateDiv = document.getElementById("info");
    fetch("https://raw.githubusercontent.com/chumpblocckami/merchantscroll/refs/heads/main/info.json")
      .then(res => res.ok ? res.json() : Promise.reject("Could not fetch last update."))
      .then(data => updateDiv.textContent = data.last_update ? `Last update: ${data.last_update}` : "No update info.")
      .catch(() => updateDiv.textContent = "Error loading update info.");
  </script>
