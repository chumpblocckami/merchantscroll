  <script>
    const $ = (s) => document.getElementById(s);

    /* ── Theme toggle ── */
    const themeBtn = $("theme-toggle");
    const themeMeta = document.querySelector('meta[name="theme-color"]');
    function applyTheme(mode) {
      document.documentElement.classList.toggle("light", mode === "light");
      themeBtn.textContent = mode === "light" ? "\u2600" : "\u263E";
      if (themeMeta) themeMeta.content = mode === "light" ? "#fafafa" : "#0f0f0f";
    }
    const savedTheme = localStorage.getItem("ms-theme") || "dark";
    applyTheme(savedTheme);
    themeBtn.addEventListener("click", () => {
      const next = document.documentElement.classList.contains("light") ? "dark" : "light";
      localStorage.setItem("ms-theme", next);
      applyTheme(next);
    });

    const content = $("content");
    const loader = $("loader");
    const cardPreview = $("card-preview");
    const cardPreviewImg = $("card-preview-img");
    const breadcrumbEl = $("breadcrumb");
    const headerEl = document.querySelector(".header-container");
    const isTouch = "ontouchstart" in window || navigator.maxTouchPoints > 0;

    function syncHeaderHeight() {
      if (!headerEl) return;
      document.documentElement.style.setProperty("--header-height", `${headerEl.offsetHeight}px`);
    }
    syncHeaderHeight();
    if (typeof ResizeObserver !== "undefined" && headerEl) {
      new ResizeObserver(syncHeaderHeight).observe(headerEl);
    } else {
      window.addEventListener("resize", syncHeaderHeight);
    }

    /* ── State ── */
    let tournamentIndex = [];
    let nextTournamentIdx = 0;
    let allDecks = [];
    let filteredDecks = [];
    let deckIdx = 0;
    let loading = false;
    let slideDir = 1;
    const currentYear = new Date().getFullYear().toString();
    const loadedTournaments = new Set();
    let totalDeckCount = "";
    let archetypeMap = {};
    let deckViewMode = localStorage.getItem("ms-deck-view") === "visual" ? "visual" : "text";
    let visualImageLoadId = 0;
    const scryfallImageCache = new Map();


    /* ── Color map ── */
    const COLOR_MAP = {
      W: { label: "White", hex: "#f0d060" },
      U: { label: "Blue", hex: "#0e68ab" },
      B: { label: "Black", hex: "#2b2b2b" },
      R: { label: "Red", hex: "#d32029" },
      G: { label: "Green", hex: "#00733e" },
      C: { label: "Colorless", hex: "#9e9e9e" },
    };

    /* ── Deck classification ── */
    function classifyDeck(deck) {
      if (deck.archetype) return deck.archetype;
      if (!Object.keys(archetypeMap).length) return "";
      const cardNames = new Set();
      for (const c of (deck.main_deck || [])) cardNames.add(c.card_attributes.card_name);
      let bestName = "", bestScore = 0;
      for (const [archetype, signatures] of Object.entries(archetypeMap)) {
        const matched = signatures.filter(s => cardNames.has(s)).length;
        const score = matched / signatures.length;
        if (score > bestScore) { bestScore = score; bestName = archetype; }
      }
      return bestScore >= 0.5 ? bestName : "";
    }

    /* ── Card preview ── */
    function scryfallImg(name) {
      return scryfallImageCache.get(name)?.normal
        || `https://api.scryfall.com/cards/named?exact=${encodeURIComponent(name)}&format=image&version=normal`;
    }

    function scryfallImgSmall(name) {
      return scryfallImageCache.get(name)?.small
        || `https://api.scryfall.com/cards/named?exact=${encodeURIComponent(name)}&format=image&version=small`;
    }

    function storeScryfallImages(name, uris) {
      if (!uris?.small && !uris?.normal) return;
      scryfallImageCache.set(name, {
        small: uris.small || uris.normal,
        normal: uris.normal || uris.small,
      });
    }

    function cardImageUris(card) {
      return card.image_uris || card.card_faces?.[0]?.image_uris || null;
    }

    async function fetchSingleCardImage(name) {
      try {
        const res = await fetch(
          `https://api.scryfall.com/cards/named?exact=${encodeURIComponent(name)}`
        );
        if (!res.ok) return null;
        const card = await res.json();
        const uris = cardImageUris(card);
        if (!uris) return null;
        storeScryfallImages(name, uris);
        return uris.small || uris.normal;
      } catch {
        return null;
      }
    }

    async function fetchScryfallImages(names) {
      const result = new Map();
      const missing = [];
      for (const name of names) {
        const cached = scryfallImageCache.get(name);
        if (cached?.small) result.set(name, cached.small);
        else missing.push(name);
      }
      if (missing.length === 0) return result;

      try {
        const res = await fetch("https://api.scryfall.com/cards/collection", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ identifiers: missing.map((name) => ({ name })) }),
        });
        if (!res.ok) throw new Error("Scryfall collection request failed");
        const data = await res.json();

        for (const card of data.data || []) {
          storeScryfallImages(card.name, cardImageUris(card));
        }

        for (const name of missing) {
          const cached = scryfallImageCache.get(name);
          if (cached?.small) {
            result.set(name, cached.small);
            continue;
          }
          const url = await fetchSingleCardImage(name);
          if (url) result.set(name, url);
        }
      } catch (err) {
        console.warn("Scryfall batch image fetch failed:", err);
        for (const name of missing) {
          if (!result.has(name)) result.set(name, scryfallImgSmall(name));
        }
      }

      return result;
    }

    function openCardPreview(name, x, y) {
      cardPreviewImg.src = scryfallImg(name);
      cardPreview.style.display = "block";
      if (x != null && y != null) {
        positionPreview(x, y);
        return;
      }
      const pw = 220, ph = 310;
      cardPreview.style.left = ((window.innerWidth - pw) / 2) + "px";
      cardPreview.style.top = ((window.innerHeight - ph) / 2) + "px";
    }

    function showPreview(name, x, y) {
      openCardPreview(name, x, y);
    }

    function positionPreview(x, y) {
      const pw = 260, ph = 370;
      let left = x + 16, top = y + 16;
      if (left + pw > window.innerWidth) left = x - pw - 8;
      if (top + ph > window.innerHeight) top = window.innerHeight - ph - 8;
      if (top < 0) top = 8;
      cardPreview.style.left = left + "px";
      cardPreview.style.top = top + "px";
    }

    function hidePreview() {
      cardPreview.style.display = "none";
      cardPreviewImg.src = "";
    }

    /* ── Card categorization ── */
    function categorizeCards(cards) {
      const cats = {
        creatures: { label: "Creatures", entries: {}, total: 0 },
        spells: { label: "Spells", entries: {}, total: 0 },
        lands: { label: "Lands", entries: {}, total: 0 },
      };
      for (const card of cards) {
        const name = card.card_attributes.card_name;
        const type = (card.card_attributes.card_type || "").trim();
        const qty = parseInt(card.qty) || 1;
        const cat = type.includes("CREA") ? "creatures"
          : type === "LAND" ? "lands"
          : "spells";
        cats[cat].entries[name] = (cats[cat].entries[name] || 0) + qty;
        cats[cat].total += qty;
      }
      return cats;
    }

    function flatGroup(cards) {
      const g = {};
      for (const c of cards) {
        const name = c.card_attributes.card_name;
        g[name] = (g[name] || 0) + (parseInt(c.qty) || 1);
      }
      return Object.entries(g).sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0]));
    }

    /* ── DOM builders ── */
    function el(tag, cls, text) {
      const e = document.createElement(tag);
      if (cls) e.className = cls;
      if (text != null) e.textContent = text;
      return e;
    }

    function attachPreview(span, name) {
      attachCardPreview(span, name);
    }

    function attachCardPreview(node, name) {
      node.addEventListener("click", (e) => {
        e.stopPropagation();
        openCardPreview(name);
      });
      if (!isTouch) {
        node.addEventListener("mouseenter", (e) => showPreview(name, e.clientX, e.clientY));
        node.addEventListener("mousemove", (e) => positionPreview(e.clientX, e.clientY));
        node.addEventListener("mouseleave", hidePreview);
      }
    }

    function deckCardTotal(cards) {
      return cards.reduce((sum, card) => sum + (parseInt(card.qty, 10) || 1), 0);
    }

    function showTileFallback(tile, name) {
      tile.classList.remove("card-tile-loading");
      tile.classList.add("card-tile-fallback");
      const img = tile.querySelector(".card-tile-img");
      if (img) img.remove();
      if (!tile.querySelector(".card-tile-fallback-name")) {
        tile.appendChild(el("span", "card-tile-fallback-name", name));
      }
    }

    function cardTile(name, qty) {
      const tile = el("button", "card-tile card-tile-loading");
      tile.type = "button";
      tile.dataset.cardName = name;
      tile.setAttribute("aria-label", qty > 1 ? `${qty} ${name}` : name);

      const img = document.createElement("img");
      img.className = "card-tile-img";
      img.alt = name;
      img.decoding = "async";
      img.addEventListener("load", () => tile.classList.remove("card-tile-loading"));
      img.addEventListener("error", () => showTileFallback(tile, name));

      tile.appendChild(img);
      if (qty > 1) tile.appendChild(el("span", "card-tile-qty", qty));
      attachCardPreview(tile, name);

      return tile;
    }

    function hydrateVisualGrid(grid, cards) {
      const loadId = visualImageLoadId;
      const names = flatGroup(cards).map(([name]) => name);
      fetchScryfallImages(names).then((uriMap) => {
        if (loadId !== visualImageLoadId) return;
        for (const tile of grid.querySelectorAll(".card-tile")) {
          const name = tile.dataset.cardName;
          const url = uriMap.get(name);
          const img = tile.querySelector(".card-tile-img");
          if (!img) continue;
          if (url) {
            img.src = url;
          } else {
            showTileFallback(tile, name);
          }
        }
        const deck = grid.closest(".deck-container.visual-deck");
        if (deck) scheduleVisualFit(deck);
      });
    }

    function renderVisualGrid(cards) {
      const grid = el("div", "deck-visual-grid");
      for (const [name, qty] of flatGroup(cards)) {
        grid.appendChild(cardTile(name, qty));
      }
      hydrateVisualGrid(grid, cards);
      return grid;
    }

    const CARD_TILE_ASPECT = 680 / 488;
    let visualFitObserver = null;

    function fitVisualGrid(grid, width, height) {
      const count = grid?.children.length || 0;
      if (!count || width <= 0 || height <= 0) return;

      const gap = window.innerWidth < 768 ? 3 : 4;
      let bestFit = null;
      let bestOverflow = null;

      for (let cols = 1; cols <= count; cols++) {
        const rows = Math.ceil(count / cols);
        const tileW = (width - gap * (cols - 1)) / cols;
        if (tileW < 22) break;
        const tileH = tileW * CARD_TILE_ASPECT;
        const totalH = rows * tileH + gap * Math.max(rows - 1, 0);
        const overflow = totalH - height;

        if (overflow <= 0) {
          if (!bestFit || tileW > bestFit.tileW) {
            bestFit = { cols, tileW, tileH, gap };
          }
          continue;
        }

        if (!bestOverflow || overflow < bestOverflow.overflow) {
          bestOverflow = { cols, tileW, tileH, gap, overflow };
        }
      }

      const chosen = bestFit || bestOverflow;
      if (!chosen) return;

      grid.style.gridTemplateColumns = `repeat(${chosen.cols}, ${chosen.tileW}px)`;
      grid.style.gap = `${chosen.gap}px`;
      grid.style.justifyContent = "center";
      for (const tile of grid.children) {
        tile.style.width = `${chosen.tileW}px`;
        tile.style.height = `${chosen.tileH}px`;
      }
    }

    function fitVisualDeckLayout(container) {
      if (deckViewMode !== "visual" || !container) return;
      const columns = container.querySelector(".decklist-columns.visual-mode");
      if (!columns) return;

      const availH = columns.clientHeight;
      const availW = columns.clientWidth;
      if (availH <= 0 || availW <= 0) return;

      const mainCol = columns.querySelector(".deck-col:not(.sideboard-col)");
      const sbCol = columns.querySelector(".sideboard-col");
      const columnGap = window.innerWidth < 768 ? 6 : 12;

      if (mainCol && sbCol) {
        const sbWidth = Math.min(108, Math.max(72, availW * 0.24));
        const mainWidth = availW - sbWidth - columnGap;
        const titleH = 22;
        const mainGrid = mainCol.querySelector(".deck-visual-grid");
        const sbGrid = sbCol.querySelector(".deck-visual-grid");
        fitVisualGrid(mainGrid, mainWidth, availH - titleH);
        fitVisualGrid(sbGrid, sbWidth, availH - titleH);
        return;
      }

      const col = mainCol || sbCol;
      const grid = col?.querySelector(".deck-visual-grid");
      if (grid) fitVisualGrid(grid, availW, availH - 22);
    }

    function scheduleVisualFit(container) {
      if (deckViewMode !== "visual" || !container) return;
      requestAnimationFrame(() => {
        requestAnimationFrame(() => fitVisualDeckLayout(container));
      });
    }

    function observeVisualDeckLayout(container) {
      if (!container || deckViewMode !== "visual") return;
      scheduleVisualFit(container);
      if (typeof ResizeObserver === "undefined") return;
      if (!visualFitObserver) {
        visualFitObserver = new ResizeObserver((entries) => {
          for (const entry of entries) {
            const deck = entry.target.closest(".deck-container.visual-deck");
            if (deck) scheduleVisualFit(deck);
          }
        });
      }
      visualFitObserver.disconnect();
      const columns = container.querySelector(".decklist-columns");
      if (columns) visualFitObserver.observe(columns);
    }

    function cardRow(name, qty) {
      const row = el("div", "card-row");
      row.appendChild(el("span", "card-qty", qty));
      const nameSpan = el("span", "card-name", name);
      attachPreview(nameSpan, name);
      row.appendChild(nameSpan);
      return row;
    }

    function renderCategories(cards) {
      const cats = categorizeCards(cards);
      const frag = document.createDocumentFragment();
      for (const key of ["creatures", "spells", "lands"]) {
        const cat = cats[key];
        if (cat.total === 0) continue;
        const section = el("div", "card-category");
        section.appendChild(el("div", "category-label", `${cat.label} (${cat.total})`));
        const sorted = Object.entries(cat.entries).sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0]));
        for (const [name, qty] of sorted) section.appendChild(cardRow(name, qty));
        frag.appendChild(section);
      }
      return frag;
    }

    function renderFlat(cards) {
      const frag = document.createDocumentFragment();
      for (const [name, qty] of flatGroup(cards)) frag.appendChild(cardRow(name, qty));
      return frag;
    }

    function formatRecord(deck) {
      if (deck.wins) return `${deck.wins.wins}-${deck.wins.losses}`;
      return "";
    }

    function playerLink(name, entry) {
      const btn = el("button", "player-link", name || "Unknown");
      btn.type = "button";
      btn.addEventListener("click", (e) => {
        e.stopPropagation();
        openPlayerProfile(name);
      });
      return btn;
    }

    function archetypeSlug(name) {
      const slug = (name || "")
        .toLowerCase()
        .replace(/[^\w\s-]/g, "")
        .replace(/[\s_]+/g, "-")
        .replace(/^-+|-+$/g, "");
      return slug || "unknown";
    }

    function deckLink(name) {
      const btn = el("button", "deck-link player-name", name || "Unknown");
      btn.type = "button";
      btn.addEventListener("click", (e) => {
        e.stopPropagation();
        openDeckProfile(name);
      });
      return btn;
    }

    /* ── Player modal ── */
    const playerModal = $("player-modal");
    const playerModalBody = $("player-modal-body");
    let playerModalOpen = false;

    function isPlayerModalOpen() {
      return playerModalOpen;
    }

    function statStack() {
      return el("div", "player-modal-stat-value player-modal-stat-stack");
    }

    function appendStatLine(parent, num, text, sub = false) {
      const line = el("div", "player-modal-stat-line" + (sub ? " player-modal-stat-line--sub" : ""));
      line.appendChild(el("span", "player-modal-stat-num", num));
      line.appendChild(el("span", "player-modal-stat-text", text));
      parent.appendChild(line);
    }

    function appendRankBlock(parent, label, value) {
      const block = el("div", "player-modal-stat-rank");
      block.appendChild(el("span", "player-modal-stat-rank-label", label));
      block.appendChild(el("span", "player-modal-stat-rank-value", value));
      parent.appendChild(block);
    }

    function buildLeagueStatEl(stats, rankUnit = "players") {
      const wrap = statStack();
      const entries = stats.league_entries;
      if (entries != null) {
        appendStatLine(wrap, String(entries), entries === 1 ? "league entry" : "league entries");
      }

      const trophies = stats.league_trophies || 0;
      appendStatLine(wrap, String(trophies), trophies === 1 ? "trophy" : "trophies", entries != null);

      const yearly = stats.league_trophies_yearly || 0;
      if (yearly > 0) {
        appendStatLine(wrap, String(yearly), `in ${currentYear}`, true);
      }

      const yrRank = stats.league_trophy_rank_yearly;
      const yrPool = stats.league_trophy_decks_yearly ?? stats.league_trophy_players_yearly;
      if (yrRank && yrPool) {
        appendRankBlock(
          wrap,
          `Most trophies · ${currentYear}`,
          `#${yrRank} of ${yrPool} ${rankUnit}`
        );
      }

      const atRank = stats.league_trophy_rank_alltime;
      const atPool = stats.league_trophy_decks_alltime ?? stats.league_trophy_players_alltime;
      if (atRank && atPool) {
        appendRankBlock(
          wrap,
          "Most trophies · all-time",
          `#${atRank} of ${atPool} ${rankUnit}`
        );
      }

      return wrap;
    }

    function buildChallengeStatEl(stats, includeAppearances = false) {
      const wrap = statStack();
      const appearances = stats.challenge_appearances || 0;
      if (includeAppearances && appearances) {
        appendStatLine(
          wrap,
          String(appearances),
          appearances === 1 ? "appearance" : "appearances"
        );
      }

      const cw = stats.challenge_wins || 0;
      const cl = stats.challenge_losses || 0;
      const total = cw + cl;
      if (!total && !appearances) {
        const empty = el("span", "player-modal-stat-text", "—");
        wrap.appendChild(empty);
        return wrap;
      }

      if (total) {

    /* ── Deck export ── */
    function formatDeckColors(colors) {
      if (!colors?.length) return "";
      return "[" + colors.join("") + "]";
    }

    function exportDeckText(entry) {
      const deck = entry.decklist;
      const lines = [];
      const colors = formatDeckColors(deck.colors);
      const archetype = classifyDeck(deck);
      const headerParts = [entry.player || "Unknown", colors, archetype].filter(Boolean);
      lines.push(`// ${headerParts.join(" ")} — ${entry.tournamentName || "?"} — ${entry.tournamentDate || "?"}`);
      const record = formatRecord(deck);
      if (record) lines.push(`// Record: ${record}`);
      lines.push("");

      const mainCards = (deck.main_deck || []).slice().sort(
        (a, b) => a.card_attributes.card_name.localeCompare(b.card_attributes.card_name)
      );
      for (const card of mainCards) {
        lines.push(`${card.qty} ${card.card_attributes.card_name}`);
      }

      lines.push("");
      lines.push("Sideboard");
      const sbCards = (deck.sideboard_deck || []).slice().sort(
        (a, b) => a.card_attributes.card_name.localeCompare(b.card_attributes.card_name)
      );
      for (const card of sbCards) {
        lines.push(`${card.qty} ${card.card_attributes.card_name}`);
      }

      return lines.join("\n");
    }

    function safeFilename(name) {
      return (name || "deck").replace(/[^\w\-]+/g, "_").replace(/^_|_$/g, "").slice(0, 60) || "deck";
    }

    function exportFilename(entry) {
      const player = safeFilename(entry.player);
      const type = deriveTournamentType(entry.tournamentName, entry.siteName).toLowerCase() || "event";
      const date = dateKey(entry.tournamentDate) || "unknown";
      return `${player}_${type}_${date}.txt`;
    }

    let actionToastTimer = null;
    function showActionToast(message) {
      const toast = $("action-toast");
      if (!toast) return;
      toast.textContent = message;
      toast.hidden = false;
      requestAnimationFrame(() => toast.classList.add("visible"));
      clearTimeout(actionToastTimer);
      actionToastTimer = setTimeout(() => {
        toast.classList.remove("visible");
        toast.hidden = true;
      }, 2800);
    }

    async function copyDecklistText(text) {
      if (navigator.clipboard?.writeText) {
        await navigator.clipboard.writeText(text);
        return true;
      }
      const area = document.createElement("textarea");
      area.value = text;
      area.setAttribute("readonly", "");
      area.style.position = "fixed";
      area.style.left = "-9999px";
      document.body.appendChild(area);
      area.select();
      const ok = document.execCommand("copy");
      area.remove();
      return ok;
    }

    async function shareDecklistFile(text, filename) {
      if (!navigator.share) return false;
      const file = new File([text], filename, { type: "text/plain;charset=utf-8" });
      try {
        if (navigator.canShare?.({ files: [file] })) {
          await navigator.share({ files: [file], title: filename });
          return true;
        }
        await navigator.share({ title: filename, text });
        return true;
      } catch (err) {
        if (err?.name === "AbortError") return true;
        return false;
      }
    }

    function triggerBlobDownload(text, filename) {
      const blob = new Blob([text], { type: "text/plain;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = filename;
      a.rel = "noopener";
      a.style.display = "none";
      document.body.appendChild(a);
      a.click();
      setTimeout(() => {
        URL.revokeObjectURL(url);
        a.remove();
      }, 2000);
    }

    async function downloadDecklist(entry) {
      const text = exportDeckText(entry);
      const filename = exportFilename(entry);

      if (isTouch) {
        if (await shareDecklistFile(text, filename)) {
          showActionToast("Decklist ready to save or share");
          return;
        }
        try {
          if (await copyDecklistText(text)) {
            showActionToast("Decklist copied — paste into MTGO or Moxfield");
            return;
          }
        } catch (_) {}
        try {
          triggerBlobDownload(text, filename);
          showActionToast("Downloading decklist…");
          return;
        } catch (_) {}
        showActionToast("Could not export decklist on this device");
        return;
      }

      triggerBlobDownload(text, filename);
    }

    /* ── Tournament badge ── */
    function deriveTournamentType(name, siteName) {
      if ((siteName || "").startsWith("pauperwave-")) return "IRL";
      const lower = (name || "").toLowerCase();
      const segments = lower.split(/[\s\-]+/);
      for (const seg of segments) {
        if (["league", "challenge", "showcase", "preliminary", "premier", "classic"].includes(seg)) {
          return seg.charAt(0).toUpperCase() + seg.slice(1);
        }
      }
      return "";
    }

    function badgeColor(type) {
      const map = {
        League: "#2e7d32",
        Challenge: "#1565c0",
        Showcase: "#7b1fa2",
        Preliminary: "#e65100",
        Premier: "#c62828",
        Classic: "#4e342e",
        IRL: "#d4a017",
      };
      return map[type] || "#757575";
    }

    function renderBadge(tournamentName, siteName) {
      const type = deriveTournamentType(tournamentName, siteName);
      if (!type) return null;
      const badge = el("span", "tournament-badge", type);
      badge.style.backgroundColor = badgeColor(type);
      return badge;
    }

    /* ── Breadcrumb helpers ── */
    function formatDateBreadcrumb(dateStr) {
      if (!dateStr) return "";
      const d = new Date(dateStr.split(" ")[0]);
      if (isNaN(d)) return dateStr.split(" ")[0];
      return d.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
    }

    function dateKey(dateStr) {
      return (dateStr || "").split(" ")[0];
    }

    function getAvailableDates() {
      const seen = new Set();
      const dates = [];
      for (const t of tournamentIndex) {
        const dk = dateKey(t.starttime);
        if (dk && !seen.has(dk)) { seen.add(dk); dates.push(dk); }
      }
      return dates;
    }

    function getTournamentsForDate(dk) {
      return tournamentIndex.filter(t => dateKey(t.starttime) === dk);
    }

    function tournamentLabel(siteName) {
      const parts = siteName.split("-");
      const format = parts[0] || "";
      const typeWords = [];
      for (let i = 1; i < parts.length; i++) {
        if (/^\d{4}$/.test(parts[i])) break;
        typeWords.push(parts[i]);
      }
      return [format, ...typeWords].map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(" ");
    }

    function findDeckPositionInTournament(entry) {
      let pos = 0, total = 0;
      for (let i = 0; i < filteredDecks.length; i++) {
        const d = filteredDecks[i];
        if (d.siteName === entry.siteName) {
          total++;
          if (i <= deckIdx) pos++;
        }
      }
      return { pos, total };
    }

    function getPlayersInTournament(siteName) {
      const players = [];
      for (let i = 0; i < filteredDecks.length; i++) {
        if (filteredDecks[i].siteName === siteName) {
          const dl = filteredDecks[i].decklist;
          const arch = classifyDeck(dl);
          players.push({
            idx: i,
            player: filteredDecks[i].player,
            colors: dl.colors,
            record: formatRecord(dl),
            archetype: arch,
          });
        }
      }
      return players;
    }

    /* ── Dropdown system ── */
    let openDropdown = null;

    function closeDropdown() {
      if (openDropdown) { openDropdown.remove(); openDropdown = null; }
    }

    document.addEventListener("click", (e) => {
      if (openDropdown && !e.target.closest(".bc-dropdown") && !e.target.closest(".bc-trigger")) {
        closeDropdown();
      }
      if (isTouch && !e.target.closest(".card-name, .card-tile")) hidePreview();
    });

    function showDropdown(trigger, items, onSelect) {
      closeDropdown();
      const dd = el("div", "bc-dropdown");
      const list = el("div", "bc-dropdown-list");

      for (const item of items) {
        const row = el("div", "bc-dropdown-item" + (item.active ? " active" : ""));
        if (item.pips) {
          row.appendChild(renderColorPips(item.pips));
        }
        row.appendChild(document.createTextNode(item.label));
        if (item.sub) {
          row.appendChild(el("span", "bc-dropdown-sub", item.sub));
        }
        row.addEventListener("click", (e) => {
          e.stopPropagation();
          closeDropdown();
          onSelect(item.value);
        });
        list.appendChild(row);
      }

      dd.appendChild(list);
      const rect = trigger.getBoundingClientRect();
      dd.style.top = (rect.bottom + 4) + "px";
      dd.style.left = Math.max(8, rect.left + rect.width / 2 - 120) + "px";
      document.body.appendChild(dd);
      openDropdown = dd;

      const activeEl = dd.querySelector(".active");
      if (activeEl) activeEl.scrollIntoView({ block: "center" });
    }

    /* ── Breadcrumb navigation ── */
    async function navigateToDate(dk) {
      const tournaments = getTournamentsForDate(dk);
      if (!tournaments.length) return;
      await ensureTournamentLoaded(tournaments[0].site_name);
      const idx = filteredDecks.findIndex(d => dateKey(d.tournamentDate) === dk);
      if (idx >= 0) { deckIdx = idx; showDeck(); }
    }

    async function navigateToTournament(siteName) {
      await ensureTournamentLoaded(siteName);
      const idx = filteredDecks.findIndex(d => d.siteName === siteName);
      if (idx >= 0) { deckIdx = idx; showDeck(); }
    }

    function navigateToDeck(idx) {
      deckIdx = idx;
      showDeck();
    }

    async function ensureTournamentLoaded(siteName) {
      if (loadedTournaments.has(siteName)) return;
      const idxPos = tournamentIndex.findIndex(t => t.site_name === siteName);
      if (idxPos < 0) return;

      loading = true;
      try {
        const res = await fetch(`assets/pauper/raw/${siteName}.json`, { cache: "no-store" });
        if (!res.ok) throw new Error("fetch failed");
        const data = await res.json();

        const name = data.description || data.name || "";
        const date = data.starttime || data.publish_date || "";
        for (const dl of (data.decklists || [])) {
          allDecks.push({
            tournamentName: name,
            tournamentDate: date,
            siteName: siteName,
            player: dl.player,
            decklist: dl,
          });
        }
        loadedTournaments.add(siteName);

        allDecks.sort((a, b) => {
          const da = dateKey(a.tournamentDate), db = dateKey(b.tournamentDate);
          if (da !== db) return db.localeCompare(da);
          return 0;
        });

        filteredDecks = allDecks;
      } catch (e) {
        console.warn("Failed to load tournament:", siteName, e);
      }
      loading = false;
    }

    /* ── Breadcrumb renderer ── */
    function updateBreadcrumb(entry) {
      if (!entry) { breadcrumbEl.textContent = ""; return; }

      const currentDate = dateKey(entry.tournamentDate);
      const dateLabel = formatDateBreadcrumb(entry.tournamentDate);
      const tournamentName = entry.tournamentName || "Unknown";
      const { pos, total } = findDeckPositionInTournament(entry);

      breadcrumbEl.innerHTML = "";

      const dateTrigger = el("span", "bc-trigger", dateLabel + " \u25BE");
      dateTrigger.addEventListener("click", (e) => {
        e.stopPropagation();
        const dates = getAvailableDates();
        const items = dates.map(dk => ({
          label: formatDateBreadcrumb(dk),
          value: dk,
          sub: getTournamentsForDate(dk).length + " event" + (getTournamentsForDate(dk).length !== 1 ? "s" : ""),
          active: dk === currentDate,
        }));
        showDropdown(dateTrigger, items, navigateToDate);
      });
      breadcrumbEl.appendChild(dateTrigger);
      breadcrumbEl.appendChild(el("span", "bc-sep", "\u203A"));

      const tournTrigger = el("span", "bc-trigger", tournamentName + " \u25BE");
      tournTrigger.addEventListener("click", (e) => {
        e.stopPropagation();
        const tournaments = getTournamentsForDate(currentDate);
        const items = tournaments.map(t => ({
          label: tournamentLabel(t.site_name),
          value: t.site_name,
          sub: t.deck_count + " decks",
          active: t.site_name === entry.siteName,
        }));
        showDropdown(tournTrigger, items, navigateToTournament);
      });
      breadcrumbEl.appendChild(tournTrigger);
      breadcrumbEl.appendChild(el("span", "bc-sep", "\u203A"));

      const deckTrigger = el("span", "bc-trigger bc-position", `Deck ${pos} of ${total} \u25BE`);
      deckTrigger.addEventListener("click", (e) => {
        e.stopPropagation();
        const players = getPlayersInTournament(entry.siteName);
        const items = players.map((p, i) => ({
          label: p.player,
          value: p.idx,
          pips: p.colors,
          sub: [p.archetype, p.record].filter(Boolean).join(" · ") || null,
          active: p.idx === deckIdx,
        }));
        showDropdown(deckTrigger, items, navigateToDeck);
      });
      breadcrumbEl.appendChild(deckTrigger);
    }

    /* ── Deck renderer ── */
    function renderDeck(entry) {
      const deck = entry.decklist;
      const container = el("div", "deck-container");
      if (deckViewMode === "visual") container.classList.add("visual-deck");

      const header = el("div", "deck-header");

      const archetype = classifyDeck(deck);

      const nameRow = el("div", "deck-title-row");
      nameRow.appendChild(renderColorPips(deck.colors));
      let titleEl;
      if (archetype) {
        titleEl = deckLink(archetype);
        nameRow.appendChild(titleEl);
      } else {
        titleEl = el("span", "player-name", entry.player || "Unknown");
        nameRow.appendChild(titleEl);
      }
      const record = formatRecord(deck);
      if (record) {
        const recEl = el("span", "player-record", record);
        nameRow.appendChild(recEl);
      }
      const badge = renderBadge(entry.tournamentName, entry.siteName);
      if (badge) nameRow.appendChild(badge);
      header.appendChild(nameRow);

      if (archetype) {
        const pilot = playerLink(entry.player || "Unknown", entry);
        pilot.classList.add("deck-archetype");
        header.appendChild(pilot);
      } else {
        const link = playerLink(entry.player || "Unknown", entry);
        link.classList.add("player-name");
        titleEl.replaceWith(link);
      }

      if (!isTouch) {
        const hint = el("div", "kbd-hint");
        const hintLeft = el("span", "kbd-hint-part kbd-hint-left");
        const hintCenter = el("span", "kbd-hint-part kbd-hint-center");
        const hintRight = el("span", "kbd-hint-part kbd-hint-right");
        const kUp = document.createElement("kbd"); kUp.textContent = "\u2191";
        const kDown = document.createElement("kbd"); kDown.textContent = "\u2193";
        const kLeft = document.createElement("kbd"); kLeft.textContent = "\u2190";
        const kRight = document.createElement("kbd"); kRight.textContent = "\u2192";
        hintLeft.appendChild(kLeft);
        hintLeft.appendChild(document.createTextNode(" metagame"));
        hintCenter.appendChild(kUp);
        hintCenter.appendChild(document.createTextNode(" "));
        hintCenter.appendChild(kDown);
        hintCenter.appendChild(document.createTextNode(" decks"));
        hintRight.appendChild(kRight);
        hintRight.appendChild(document.createTextNode(" player"));
        hint.appendChild(hintLeft);
        hint.appendChild(hintCenter);
        hint.appendChild(hintRight);
        header.appendChild(hint);
      }

      container.appendChild(header);

      const columns = el("div", "decklist-columns");
      if (deckViewMode === "visual") columns.classList.add("visual-mode");

      if (deck.main_deck?.length) {
        const col = el("div", "deck-col");
        const mainTotal = deckCardTotal(deck.main_deck);
        col.appendChild(el("h4", "col-title", `Main Deck (${mainTotal})`));
        col.appendChild(
          deckViewMode === "visual"
            ? renderVisualGrid(deck.main_deck)
            : renderCategories(deck.main_deck)
        );
        columns.appendChild(col);
      }

      if (deck.sideboard_deck?.length) {
        const col = el("div", "deck-col sideboard-col");
        const sbTotal = deckCardTotal(deck.sideboard_deck);
        col.appendChild(el("h4", "col-title sideboard-title", `Sideboard (${sbTotal})`));
        col.appendChild(
          deckViewMode === "visual"
            ? renderVisualGrid(deck.sideboard_deck)
            : renderFlat(deck.sideboard_deck)
        );
        columns.appendChild(col);
      }

      container.appendChild(columns);

      const actions = el("div", "deck-actions");
      const viewToggleBtn = el(
        "button",
        "deck-action-btn deck-view-toggle",
        deckViewMode === "text" ? "\u9638  Visual" : "\u2630  Text"
      );
      viewToggleBtn.type = "button";
      viewToggleBtn.setAttribute(
        "aria-label",
        deckViewMode === "text" ? "Switch to visual deck view" : "Switch to text deck view"
      );
      bindDeckActionButton(viewToggleBtn, () => {
        deckViewMode = deckViewMode === "text" ? "visual" : "text";
        localStorage.setItem("ms-deck-view", deckViewMode);
        showDeck();
      });
      actions.appendChild(viewToggleBtn);

      const downloadBtn = el("button", "deck-action-btn download-btn", "\u2913  Export MTGO");
      downloadBtn.type = "button";
      downloadBtn.setAttribute("aria-label", "Download decklist as text file");
      bindDeckActionButton(downloadBtn, () => {
        downloadDecklist(entry).catch(console.warn);
      });
      actions.appendChild(downloadBtn);
      container.appendChild(actions);

      return container;
    }

    /* ── Data loading ── */
    async function loadIndex() {
      const res = await fetch("assets/pauper/index.json", { cache: "no-store" });
      if (!res.ok) throw new Error("Failed to load index");
      return res.json();
    }

    async function loadTournament() {
      if (loading || nextTournamentIdx >= tournamentIndex.length) return;
      loading = true;

      const entry = tournamentIndex[nextTournamentIdx];
      nextTournamentIdx++;

      if (loadedTournaments.has(entry.site_name)) { loading = false; return; }

      try {
        const res = await fetch(`assets/pauper/raw/${entry.site_name}.json`, { cache: "no-store" });
        if (!res.ok) throw new Error("fetch failed");
        const data = await res.json();

        const name = data.description || data.name || "";
        const date = data.starttime || data.publish_date || "";
        for (const dl of (data.decklists || [])) {
          allDecks.push({
            tournamentName: name,
            tournamentDate: date,
            siteName: entry.site_name,
            player: dl.player,
            decklist: dl,
          });
        }
        loadedTournaments.add(entry.site_name);
        filteredDecks = allDecks;
      } catch (e) {
        console.warn("Skipping tournament:", entry.site_name, e);
      }
      loading = false;
    }

    /* ── Navigation ── */
    function showDeck() {
      if (filteredDecks.length === 0) {
        content.innerHTML = "";
        loader.textContent = "No decks loaded.";
        content.appendChild(loader);
        loader.style.display = "block";
        updateBreadcrumb(null);
        return;
      }
      if (deckIdx < 0) deckIdx = 0;
      if (deckIdx >= filteredDecks.length) {
        deckIdx = filteredDecks.length - 1;
      }
      content.innerHTML = "";
      visualImageLoadId++;
      const entry = filteredDecks[deckIdx];
      const deckEl = renderDeck(entry);
      deckEl.classList.add(slideDir > 0 ? "slide-up" : "slide-down");
      content.appendChild(deckEl);
      if (deckViewMode === "visual") observeVisualDeckLayout(deckEl);
      updateBreadcrumb(entry);
      updateProgress();
    }

    function updateProgress() {
      const thumb = $("progress-thumb");
      if (!thumb || filteredDecks.length === 0) return;
      const entry = filteredDecks[deckIdx];
      if (!entry) return;
      const tourney = filteredDecks.filter(d => d.siteName === entry.siteName);
      const posInTourney = tourney.findIndex((d, i) => filteredDecks.indexOf(d) === deckIdx);
      const total = tourney.length;
      if (total <= 1) { thumb.style.opacity = "0"; return; }
      const pct = posInTourney / (total - 1);
      const thumbH = Math.max(8, 100 / total);
      thumb.style.height = thumbH + "%";
      thumb.style.top = (pct * (100 - thumbH)) + "%";
      thumb.style.opacity = "0.5";
    }

    async function go(dir) {
      slideDir = dir;
      deckIdx += dir;
      while (deckIdx >= filteredDecks.length && nextTournamentIdx < tournamentIndex.length) {
        content.innerHTML = "";
        loader.textContent = "Loading more decks...";
        loader.style.display = "block";
        content.appendChild(loader);
        await loadTournament();
      }
      showDeck();
    }

    /* ── Input handling ── */
    let throttle = false;
    function throttledGo(dir) {
      if (throttle) return;
      throttle = true;
      closeDropdown();
      setTimeout(() => (throttle = false), 300);
      go(dir);
    }

    function openPlayerProfileFromDeck() {
      openPlayerProfile();
    }

    function openDeckProfileFromDeck() {
      openDeckProfile();
    }

    document.addEventListener("keydown", (e) => {
      if (document.activeElement?.tagName === "INPUT") return;
      if (isPlayerModalOpen()) {
        if (e.key === "Escape" || e.key === "ArrowLeft" || e.key === "ArrowRight") {
          e.preventDefault();
          closePlayerModal();
        }
        return;
      }
      if (e.key === "ArrowDown") { e.preventDefault(); throttledGo(1); }
      if (e.key === "ArrowUp") { e.preventDefault(); throttledGo(-1); }
      if (e.key === "ArrowRight") { e.preventDefault(); openPlayerProfileFromDeck(); }
      if (e.key === "ArrowLeft") { e.preventDefault(); openDeckProfileFromDeck(); }
    });

    window.addEventListener("resize", () => {
      const deck = content.querySelector(".deck-container.visual-deck");
      if (deck) scheduleVisualFit(deck);
    });

    content.addEventListener("wheel", (e) => {
      if (isPlayerModalOpen()) return;
      if (deckViewMode === "visual" && e.target.closest(".decklist-columns")) return;
      e.preventDefault();
      if (Math.abs(e.deltaX) > Math.abs(e.deltaY) && Math.abs(e.deltaX) > 30) {
        if (e.deltaX > 0) openPlayerProfileFromDeck();
        else openDeckProfileFromDeck();
        return;
      }
      throttledGo(e.deltaY > 0 ? 1 : -1);
    }, { passive: false });

    let touchStartX = 0;
    let touchStartY = 0;
    let touchStartTarget = null;

    function shouldBlockDeckSwipe(target) {
      if (!target?.closest) return false;
      if (target.closest(
        ".card-tile, .card-name, .deck-actions, .player-link, .deck-link, .deck-action-btn, .bc-trigger, .bc-dropdown"
      )) {
        return true;
      }
      if (deckViewMode === "visual" && target.closest(".decklist-columns")) {
        return true;
      }
      return false;
    }

    content.addEventListener("touchstart", (e) => {
      const touch = e.touches[0] || e.changedTouches[0];
      if (!touch) return;
      touchStartX = touch.screenX;
      touchStartY = touch.screenY;
      touchStartTarget = e.target;
    }, { passive: true });
    content.addEventListener("touchend", (e) => {
      if (shouldBlockDeckSwipe(touchStartTarget) || shouldBlockDeckSwipe(e.target)) {
        touchStartTarget = null;
        return;
      }
      if (isPlayerModalOpen()) {
        const deltaX90X = touchStartX - e.changedTouches[0].screenX;
        const deltaY = touchStartY - e.changedTouches[0].screenY;
        if (Math.abs(deltaX) > Math.abs(deltaY) && Math.abs(deltaX) > 50) closePlayerModal();
        return;
      }
      const deltaX = touchStartX - e.changedTouches[0].screenX;
      const deltaY = touchStartY - e.changedTouches[0].screenY;
      if (Math.abs(deltaX) > Math.abs(deltaY) && Math.abs(deltaX) > 50) {
        if (deltaX > 0) openPlayerProfileFromDeck();
        else openDeckProfileFromDeck();
        return;
      }
      if (Math.abs(deltaY) > 50) throttledGo(deltaY > 0 ? 1 : -1);
      touchStartTarget = null;
    });

    playerModal.addEventListener("click", (e) => {
      if (e.target === playerModal) closePlayerModal();
    });

    /* ── Init ── */
    async function refreshToLatestDecks() {
      closeDropdown();
      hidePreview();
      if (window.location.search) {
        history.replaceState(null, "", window.location.pathname);
      }
      banner.classList.remove("visible");
      banner.hidden = true;
      await init();
    }

    function offlineMessage() {
      return "You're offline — deck data unavailable. Check your connection and try again.";
    }

    async function init() {
      closePlayerModal();
      allDecks = [];
      filteredDecks = [];
      deckIdx = 0;
      nextTournamentIdx = 0;
      loadedTournaments.clear();
      content.innerHTML = "";
      loader.textContent = "Loading decks...";
      loader.style.display = "block";
      content.appendChild(loader);

      if (!navigator.onLine) {
        loader.textContent = offlineMessage();
        return;
      }

      try {
        fetch("archetypes/pauperwave.json")
          .then(r => r.ok ? r.json() : {})
          .then(d => { archetypeMap = d; })
          .catch(() => {});

        const fullIndex = await loadIndex();
        tournamentIndex = fullIndex.filter(t => t.starttime.includes(currentYear));
        totalDeckCount = `${tournamentIndex.reduce((s, t) => s + t.deck_count, 0)} decks across ${tournamentIndex.length} events`;
        $("deck-count").textContent = totalDeckCount;

        if (tournamentIndex.length > 0) {
          const params = new URLSearchParams(window.location.search);
          const jumpSite = params.get("site");
          const jumpPlayer = params.get("player");

          if (jumpSite && jumpPlayer) {
            await ensureTournamentLoaded(jumpSite);
            filteredDecks = allDecks;
            const idx = filteredDecks.findIndex(
              (d) => d.siteName === jumpSite
                && d.player.toLowerCase() === jumpPlayer.toLowerCase()
            );
            if (idx >= 0) {
              deckIdx = idx;
              showDeck();
              return;
            }
          }

          await loadTournament();
          showDeck();
        } else {
          loader.textContent = `No pauper tournaments found for ${currentYear}.`;
        }
      } catch (e) {
        console.error(e);
        loader.textContent = navigator.onLine ? "Error loading data." : offlineMessage();
      }
    }

    /* ── Freshness: reload from bfcache, banner on new data ── */
    let knownDeckCount = 0;
    const _baseInit = init;
    init = async function () {
      await _baseInit();
      knownDeckCount = tournamentIndex.reduce((s, t) => s + t.deck_count, 0);
    };

    init();

    fetch("info.json")
      .then(r => r.ok ? r.json() : Promise.reject())
      .then(d => $("info").textContent = d.last_update ? `Last update: ${d.last_update}` : "")
      .catch(() => $("info").textContent = "");

    window.addEventListener("pageshow", (e) => {
      if (e.persisted) init();
    });

    const banner = $("new-data-banner");
    banner.addEventListener("click", refreshToLatestDecks);

    const siteTitle = $("site-title");
    siteTitle.addEventListener("click", refreshToLatestDecks);
    siteTitle.addEventListener("keydown", (e) => {
      if (e.key === "Enter" || e.key === " ") {
        e.preventDefault();
        refreshToLatestDecks();
      }
    });

    document.addEventListener("visibilitychange", async () => {
      if (document.visibilityState !== "visible") return;
      try {
        const fresh = await loadIndex();
        const freshYear = fresh.filter(t => t.starttime.includes(currentYear));
        const freshCount = freshYear.reduce((s, t) => s + t.deck_count, 0);
        if (knownDeckCount > 0 && freshCount > knownDeckCount) {
          banner.hidden = false;
          requestAnimationFrame(() => banner.classList.add("visible"));
        }
      } catch (_) {}
    });

    window.addEventListener("online", () => {
      if (filteredDecks.length === 0 && loader.style.display !== "none") init();
    });

    /* ── PWA install prompt ── */
    const installBtn = $("install-app-btn");
    const installBanner = $("install-banner");
    const installBannerAction = $("install-banner-action");
    const installBannerDismiss = $("install-banner-dismiss");
    const installIosHint = $("install-ios-hint");
    let deferredInstallPrompt = null;

    const isStandaloneApp =
      window.matchMedia("(display-mode: standalone)").matches ||
      window.navigator.standalone === true;

    function isIosInstallable() {
      return /iPad|iPhone|iPod/.test(navigator.userAgent) && !isStandaloneApp;
    }

    function canOfferInstall() {
      return !isStandaloneApp && (deferredInstallPrompt || isIosInstallable());
    }

    function hideInstallUi() {
      installBtn.hidden = true;
      installBanner.hidden = true;
      installBanner.classList.remove("visible");
      installIosHint.hidden = true;
    }

    function showInstallBanner() {
      if (localStorage.getItem("ms-install-banner-dismissed") === "1") return;
      installBanner.hidden = false;
      requestAnimationFrame(() => installBanner.classList.add("visible"));
    }

    function updateInstallUi() {
      if (!canOfferInstall()) {
        hideInstallUi();
        return;
      }
      installBtn.hidden = false;
      showInstallBanner();
    }

    async function triggerInstall() {
      installIosHint.hidden = true;
      if (deferredInstallPrompt) {
        deferredInstallPrompt.prompt();
        const { outcome } = await deferredInstallPrompt.userChoice;
        if (outcome === "accepted") {
          deferredInstallPrompt = null;
          localStorage.setItem("ms-install-banner-dismissed", "1");
        }
        updateInstallUi();
        return;
      }
      if (isIosInstallable()) {
        installIosHint.hidden = !installIosHint.hidden;
      }
    }

    installBtn.addEventListener("click", triggerInstall);
    installBannerAction.addEventListener("click", triggerInstall);
    installBannerDismiss.addEventListener("click", () => {
      localStorage.setItem("ms-install-banner-dismissed", "1");
      installBanner.classList.remove("visible");
      installBanner.hidden = true;
    });

    document.addEventListener("click", (e) => {
      if (installIosHint.hidden) return;
      if (e.target === installBtn || installIosHint.contains(e.target)) return;
      installIosHint.hidden = true;
    });

    window.addEventListener("beforeinstallprompt", (e) => {
      const isLocalDev = location.hostname === "localhost" || location.hostname === "127.0.0.1";
      if (isLocalDev) return;
      e.preventDefault();
      deferredInstallPrompt = e;
      updateInstallUi();
    });

    window.addEventListener("appinstalled", () => {
      deferredInstallPrompt = null;
      localStorage.setItem("ms-install-banner-dismissed", "1");
      hideInstallUi();
    });

    if (isIosInstallable()) updateInstallUi();

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("/sw.js").catch(console.warn);
      });
    }
  </script>
  <script>
    (function () {
      const host = location.hostname;
      const isLocalDev = host === "localhost" || host === "127.0.0.1";
      if (isLocalDev) return;
      const s = document.createElement("script");
      s.async = true;
      s.dataset.goatcounter = "https://vedalken.goatcounter.com/count";
      s.src = "https://gc.zgo.at/count.js";
      document.body.appendChild(s);
    })();
  </script>
</body>
