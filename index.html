  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "Merchant Scroll",
    "url": "https://merchant-scroll.com",
    "description": "Browse infinite Magic: The Gathering Pauper decklists from MTGO tournaments.",

  }
  </script>

<body>
  <div class="header-container">
    <h1>Merchant Scroll</h1>
    <div class="subtitle">Scroll infinite Magic: The Gathering decks</div>
    <div class="header-controls">
      <div class="search-box">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8" />
          <line x1="21" y1="21" x2="16.65" y2="16.65" />
        </svg>
        <input type="text" id="search-input" placeholder="Search player..." autocomplete="off" />
      </div>
      <div class="format-selector">
        <label for="format-select">Format:</label>
        <select id="format-select" name="format">
          <option value="pauper" selected>Pauper</option>
        </select>
      </div>
    </div>
    <div class="header-meta">
      <span class="info" id="info">Loading...</span>
      <span class="info" id="deck-count"></span>
    </div>
  </div>

  <div id="content" class="image-container">
    <div class="loader" id="loader">Loading decks...</div>
  </div>

  <div id="card-preview"><img id="card-preview-img" alt="" /></div>

  <footer>
    <span>Powered by</span>
    <img src="assets/logo.png" alt="Merchant Scroll" class="footer-logo" />
  </footer>

  <script>
    const $ = (s) => document.getElementById(s);
    const content = $("content");
    const loader = $("loader");
    const searchInput = $("search-input");
    const cardPreview = $("card-preview");
    const cardPreviewImg = $("card-preview-img");
    const isTouch = "ontouchstart" in window || navigator.maxTouchPoints > 0;

    /* ── State ── */
    let tournamentIndex = [];
    let nextTournamentIdx = 0;
    let allDecks = [];
    let filteredDecks = [];
    let deckIdx = 0;
    let loading = false;
    let searchQuery = "";
    const currentYear = new Date().getFullYear().toString();

    /* ── Card preview ── */
    function scryfallImg(name) {
      return `https://api.scryfall.com/cards/named?exact=${encodeURIComponent(name)}&format=image&version=normal`;
    }

    function showPreview(name, x, y) {
      cardPreviewImg.src = scryfallImg(name);
      cardPreview.style.display = "block";
      positionPreview(x, y);
    }

    function positionPreview(x, y) {
      const pw = 260, ph = 370;
      let left = x + 16, top = y + 16;
      if (left + pw > window.innerWidth) left = x - pw - 8;
      if (top + ph > window.innerHeight) top = window.innerHeight - ph - 8;
      if (top < 0) top = 8;
      cardPreview.style.left = left + "px";
      cardPreview.style.top = top + "px";
    }

    function hidePreview() {
      cardPreview.style.display = "none";
      cardPreviewImg.src = "";
    }

    document.addEventListener("click", (e) => {
      if (isTouch && !e.target.closest(".card-name")) hidePreview();
    });

    /* ── Card categorization ── */
    function categorizeCards(cards) {
      const cats = {
        creatures: { label: "Creatures", entries: {}, total: 0 },
        spells: { label: "Spells", entries: {}, total: 0 },
        lands: { label: "Lands", entries: {}, total: 0 },
      };
      for (const card of cards) {
        const name = card.card_attributes.card_name;
        const type = (card.card_attributes.card_type || "").trim();
        const qty = parseInt(card.qty) || 1;
        const cat = type.includes("CREA") ? "creatures"
          : type === "LAND" ? "lands"
          : "spells";
        cats[cat].entries[name] = (cats[cat].entries[name] || 0) + qty;
        cats[cat].total += qty;
      }
      return cats;
    }

    function flatGroup(cards) {
      const g = {};
      for (const c of cards) {
        const name = c.card_attributes.card_name;
        g[name] = (g[name] || 0) + (parseInt(c.qty) || 1);
      }
      return Object.entries(g).sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0]));
    }

    /* ── DOM builders ── */
    function el(tag, cls, text) {
      const e = document.createElement(tag);
      if (cls) e.className = cls;
      if (text != null) e.textContent = text;
      return e;
    }

    function attachPreview(span, name) {
      if (isTouch) {
        span.addEventListener("click", (e) => {
          e.stopPropagation();
          const r = span.getBoundingClientRect();
          showPreview(name, r.left, r.bottom);
        });
      } else {
        span.addEventListener("mouseenter", (e) => showPreview(name, e.clientX, e.clientY));
        span.addEventListener("mousemove", (e) => positionPreview(e.clientX, e.clientY));
        span.addEventListener("mouseleave", hidePreview);
      }
    }

    function cardRow(name, qty) {
      const row = el("div", "card-row");
      row.appendChild(el("span", "card-qty", qty));
      const nameSpan = el("span", "card-name", name);
      attachPreview(nameSpan, name);
      row.appendChild(nameSpan);
      return row;
    }

    function renderCategories(cards) {
      const cats = categorizeCards(cards);
      const frag = document.createDocumentFragment();
      for (const key of ["creatures", "spells", "lands"]) {
        const cat = cats[key];
        if (cat.total === 0) continue;
        const section = el("div", "card-category");
        section.appendChild(el("div", "category-label", `${cat.label} (${cat.total})`));
        const sorted = Object.entries(cat.entries).sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0]));
        for (const [name, qty] of sorted) section.appendChild(cardRow(name, qty));
        frag.appendChild(section);
      }
      return frag;
    }

    function renderFlat(cards) {
      const frag = document.createDocumentFragment();
      for (const [name, qty] of flatGroup(cards)) frag.appendChild(cardRow(name, qty));
      return frag;
    }

    function formatRecord(deck) {
      if (deck.wins) return `(${deck.wins.wins}-${deck.wins.losses})`;
      return "";
    }

    function renderDeck(entry) {
      const deck = entry.decklist;
      const container = el("div", "deck-container");

      const header = el("div", "deck-header");
      const nameRow = el("div");
      const playerSpan = el("span", "player-name", entry.player || "Unknown");
      nameRow.appendChild(playerSpan);
      const record = formatRecord(deck);
      if (record) nameRow.appendChild(el("span", "player-record", record));
      header.appendChild(nameRow);

      header.appendChild(el("div", "deck-meta",
        `${entry.tournamentName}  ·  ${entry.tournamentDate.split(" ")[0]}`));

      const nav = el("div", "deck-nav");
      const prevBtn = el("button", "nav-btn", "\u2190 Prev");
      prevBtn.disabled = deckIdx <= 0;
      prevBtn.addEventListener("click", () => go(-1));
      const nextBtn = el("button", "nav-btn", "Next \u2192");
      nextBtn.addEventListener("click", () => go(1));
      const total = filteredDecks.length;
      const suffix = !searchQuery && nextTournamentIdx < tournamentIndex.length ? "+" : "";
      const counter = el("span", "nav-counter", `${deckIdx + 1} of ${total}${suffix}`);
      nav.appendChild(prevBtn);
      nav.appendChild(counter);
      nav.appendChild(nextBtn);
      header.appendChild(nav);

      if (!isTouch) {
        header.appendChild(el("div", "kbd-hint", ""));
        const hint = header.lastChild;
        const k1 = document.createElement("kbd"); k1.textContent = "\u2190";
        const k2 = document.createElement("kbd"); k2.textContent = "\u2192";
        hint.appendChild(k1);
        hint.appendChild(document.createTextNode(" "));
        hint.appendChild(k2);
        hint.appendChild(document.createTextNode(" to navigate"));
      }

      container.appendChild(header);

      const columns = el("div", "decklist-columns");

      if (deck.main_deck?.length) {
        const col = el("div", "deck-col");
        col.appendChild(el("h4", "col-title", "Main Deck"));
        col.appendChild(renderCategories(deck.main_deck));
        columns.appendChild(col);
      }

      if (deck.sideboard_deck?.length) {
        const col = el("div", "deck-col sideboard-col");
        col.appendChild(el("h4", "col-title sideboard-title", "Sideboard"));
        col.appendChild(renderFlat(deck.sideboard_deck));
        columns.appendChild(col);
      }

      container.appendChild(columns);
      return container;
    }

    /* ── Data loading ── */
    async function loadIndex(fmt) {
      const res = await fetch(`assets/${fmt}/index.json`, { cache: "no-store" });
      if (!res.ok) throw new Error("Failed to load index");
      return res.json();
    }

    async function loadTournament() {
      if (loading || nextTournamentIdx >= tournamentIndex.length) return;
      loading = true;

      const entry = tournamentIndex[nextTournamentIdx];
      nextTournamentIdx++;

      try {
        const res = await fetch(`assets/${currentFormat}/raw/${entry.site_name}.json`, { cache: "no-store" });
        if (!res.ok) throw new Error("fetch failed");
        const data = await res.json();

        const name = data.description || data.name || "";
        const date = data.starttime || data.publish_date || "";
        for (const dl of (data.decklists || [])) {
          allDecks.push({ tournamentName: name, tournamentDate: date, player: dl.player, decklist: dl });
        }
        applyFilter();
      } catch (e) {
        console.warn("Skipping tournament:", entry.site_name, e);
      }
      loading = false;
    }

    /* ── Search / filter ── */
    function applyFilter() {
      if (!searchQuery) {
        filteredDecks = allDecks;
      } else {
        const q = searchQuery.toLowerCase();
        filteredDecks = allDecks.filter(d => d.player.toLowerCase().includes(q));
      }
      $("deck-count").textContent = `${filteredDecks.length}${!searchQuery && nextTournamentIdx < tournamentIndex.length ? "+" : ""} decks`;
    }

    let searchTimeout;
    searchInput.addEventListener("input", () => {
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(() => {
        searchQuery = searchInput.value.trim();
        applyFilter();
        deckIdx = 0;
        showDeck();
      }, 200);
    });

    /* ── Navigation ── */
    function showDeck() {
      if (filteredDecks.length === 0) {
        content.innerHTML = "";
        loader.textContent = searchQuery ? "No matching decks." : "No decks loaded.";
        content.appendChild(loader);
        loader.style.display = "block";
        return;
      }
      if (deckIdx < 0) deckIdx = 0;
      if (deckIdx >= filteredDecks.length) {
        deckIdx = filteredDecks.length - 1;
      }
      content.innerHTML = "";
      content.appendChild(renderDeck(filteredDecks[deckIdx]));
    }

    async function go(dir) {
      deckIdx += dir;
      while (deckIdx >= filteredDecks.length && nextTournamentIdx < tournamentIndex.length) {
        content.innerHTML = "";
        loader.textContent = "Loading more decks...";
        loader.style.display = "block";
        content.appendChild(loader);
        await loadTournament();
      }
      showDeck();
    }

    /* ── Input handling ── */
    let throttle = false;
    function throttledGo(dir) {
      if (throttle) return;
      throttle = true;
      setTimeout(() => (throttle = false), 300);
      go(dir);
    }

    document.addEventListener("keydown", (e) => {
      if (document.activeElement === searchInput) return;
      if (e.key === "ArrowRight" || e.key === "ArrowDown") { e.preventDefault(); throttledGo(1); }
      if (e.key === "ArrowLeft" || e.key === "ArrowUp") { e.preventDefault(); throttledGo(-1); }
    });

    content.addEventListener("wheel", (e) => {
      e.preventDefault();
      throttledGo(e.deltaY > 0 ? 1 : -1);
    }, { passive: false });

    let touchStartY = 0;
    content.addEventListener("touchstart", (e) => { touchStartY = e.changedTouches[0].screenY; });
    content.addEventListener("touchend", (e) => {
      const delta = touchStartY - e.changedTouches[0].screenY;
      if (Math.abs(delta) > 50) throttledGo(delta > 0 ? 1 : -1);
    });

    /* ── Init ── */
    let currentFormat = "pauper";

    async function init(fmt) {
      currentFormat = fmt;
      allDecks = [];
      filteredDecks = [];
      deckIdx = 0;
      nextTournamentIdx = 0;
      searchQuery = "";
      searchInput.value = "";
      content.innerHTML = "";
      loader.textContent = "Loading decks...";
      loader.style.display = "block";
      content.appendChild(loader);

      try {
        const fullIndex = await loadIndex(fmt);
        tournamentIndex = fullIndex.filter(t => t.starttime.includes(currentYear));
        $("deck-count").textContent = `${tournamentIndex.reduce((s, t) => s + t.deck_count, 0)} decks across ${tournamentIndex.length} events`;

        if (tournamentIndex.length > 0) {
          await loadTournament();
          showDeck();
        } else {
          loader.textContent = `No ${fmt} tournaments found for ${currentYear}.`;
        }
      } catch (e) {
        console.error(e);
        loader.textContent = "Error loading data.";
      }
    }

    $("format-select").addEventListener("change", (e) => init(e.target.value));
    init("pauper");

    fetch("info.json")
      .then(r => r.ok ? r.json() : Promise.reject())
      .then(d => $("info").textContent = d.last_update ? `Last update: ${d.last_update}` : "")
      .catch(() => $("info").textContent = "");
  </script>
