name: Hedron Crawler

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */2 * * *'

permissions:
  contents: write

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 tqdm gitpython python-dotenv pyyaml

      - name: Set git
        env:
          USER: ${{secrets.USER}}
          MAIL: ${{secrets.MAIL}}
        run: |
          git config --global user.name "${USER}"
          git config --global user.email "${MAIL}"

      - name: Run MTGO and Pauperwave crawlers
        env:
          TOKEN: ${{ secrets.TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
          TOKEN_DECKS: ${{ secrets.TOKEN_DECKS }}
          REPO: merchantscroll
          USER: chumpblocckami
        run: python entrypoint.py

      - name: Pull latest after crawler commits
        run: git pull --rebase origin main

      - name: Build index
        run: python scripts/build_index.py

      - name: Set last update timestamp
        run: |
          echo "{\"last_update\": \"$(date -u '+%A, %B %d, %Y at %H:%M UTC')\"}" > info.json

      - name: Commit and push build artifacts
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add info.json assets/*/index.json
          git diff --cached --quiet || (git commit -m "Update index and timestamp" && git push)
