name: Hedron Crawler

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

permissions:
  contents: write

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.10

      - name: Install dependencies
        run: uv sync

      - name: Set git identity
        env:
          USER: ${{ secrets.USER }}
          MAIL: ${{ secrets.MAIL }}
        run: |
          git config --global user.name "${USER}"
          git config --global user.email "${MAIL}"

      - name: Run crawl pipeline
        env:
          TOKEN: ${{ secrets.TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
        run: uv run python crawl.py

      - name: Commit and push crawl artifacts
        run: |
          git add assets/ archetypes/ info.json
          if git diff --cached --quiet; then
            echo "No crawl changes to commit."
          else
            git commit -m "Crawler: update tournament data"
            git pull --rebase origin main
            git push origin main
          fi
